name: Scrape race calendar

on:
  schedule:
    # Runs every day at 06:00 UTC (2am ET)
    - cron: "0 6 * * *"
  workflow_dispatch: # also allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: [self-hosted, kosher-races-runner]

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --user requests beautifulsoup4

      - name: Run scraper
        run: python3 scrape.py

      - name: Commit races.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add races.json
          git commit -m "chore: update races.json [skip ci]"
          git push
